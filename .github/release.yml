changelog:
  categories:
    - title: "New Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "Bug Fixes"
      labels:
        - "fix"
        - "bugfix"
        - "bug"
    - title: "Breaking Changes"
      labels:
        - "breaking"
        - "breaking-change"
    - title: "Documentation"
      labels:
        - "docs"
        - "documentation"
    - title: "Other Changes"
      labels:
        - "*"
  exclude:
    labels:
      - "skip-changelog"
